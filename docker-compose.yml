services:

  sqlserver:                               
    image: mcr.microsoft.com/azure-sql-edge   
    environment:                           
      ACCEPT_EULA: "Y"                    
      MSSQL_SA_PASSWORD: "YourPassword123!" 
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped  
volumes:
  sqlserver-data:
